<!DOCTYPE html>
<html>
    <head>
        <style>
            #Scene {
                font-family: "Courier New", Courier, monospace;
            }
        </style>
    </head>
    <body>
        <p id="Scene">Loading...</p>
    </body>
    <script>
        const map_size = 15
        const map_iMax = Math.pow(map_size, 2);
        let player_i = Math.ceil(map_iMax / 2);
        
        //Generate Map Digged
        const map_digged = []
        for (let i_y = -1; i_y < 2; i_y++) {for (let i_x = -1; i_x < 2; i_x++) {map_digged.push(player_i - i_y * map_size - i_x)}}
        console.log("Map Digged: " + map_digged)

        //Generate Map Border
        const map_border = []
        for (let i = 1; i <= map_size; i++) {map_border.push(i); map_border.push(map_iMax - i + 1)}
        for (let i = 1; i <= map_size - 2; i++) {map_border.push(1 + map_size * i); map_border.push(map_size * (1 + i))};
        console.log("Map Border: " + map_border)
        
        //Generete Monster
        const map_monster = []
        for (let i = 0; i < 10;) {let monster_i = Math.ceil(Math.random() * map_iMax); if (!map_digged.includes(monster_i) && !map_monster.includes(monster_i)) {map_monster.push(monster_i); i++}}
        console.log("Map Monster: " + map_monster)

        
        function game_update() {
            let scene_text = ""

            //Generate Scene
            for (let i = 1, x_i = 0; i <= map_iMax; i++) {
                if (i == player_i) {scene_text += "@"} else if (map_border.includes(i)) {scene_text += "#"} else {scene_text += ".";}
                x_i++
                if (x_i == map_size) {scene_text += "<br>"; x_i = 0}
            }
            
            document.getElementById("Scene").innerHTML = scene_text
        }
        game_update()
    </script>
</html>
