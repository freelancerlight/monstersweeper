<!DOCTYPE html>
<html>
    <head>
        <style>
            #Scene {
                font-family: "Courier New", Courier, monospace;
            }
        </style>
        <title>Monstersweeper</title>
    </head>
    <body>
        <p id="Scene">Loading... (if a second passed, then the game is broken)</p>
        <button onclick="clearInterval(game_clock)">Stop Game</button>
    </body>
    <script>
        const map_size = 15
        const map_iMax = Math.pow(map_size, 2);
        let player_i = Math.ceil(map_iMax / 2);
        
        //Generate Map Digged
        const map_diggeds = []
        for (let i_y = -1; i_y < 2; i_y++) {for (let i_x = -1; i_x < 2; i_x++) {map_diggeds.push(player_i - i_y * map_size - i_x)}}
        console.log("Map Diggeds: " + map_diggeds)

        //Generate Map Border
        const map_borders = []
        for (let i = 1; i <= map_size; i++) {map_borders.push(i); map_borders.push(map_iMax - i + 1)}
        for (let i = 1; i <= map_size - 2; i++) {map_borders.push(1 + map_size * i); map_borders.push(map_size * (1 + i))};
        console.log("Map Borders: " + map_borders)
        
        //Generate Monster
        const map_monsters = []
        for (let i = 0; i < 10;) {let monster_i = Math.ceil(Math.random() * map_iMax); if (!map_diggeds.includes(monster_i) && !map_monsters.includes(monster_i)) {map_monsters.push(monster_i); i++}}
        console.log("Map Monsters: " + map_monsters)

        //Player Action
        function player_movement(_direction) {
            if (!map_borders.includes(player_i + _direction)) {player_i += _direction}
        }
        window.addEventListener("keydown", function (event) {
            player_movement((Number(event.key == "d") - Number(event.key == "a")) + (map_size * (Number(event.key == "s") - Number(event.key == "w"))))
            
            const fireKeys = ["o", "[", "k", "p"]
            if (fireKeys.includes(event.key)) {
                projectile(player_i, ((Number(event.key == "[") - Number(event.key == "o"))) + (map_size * (Number(event.key == "k") - Number(event.key == "p"))))
            }
        });

        //Player Projectile
        let projectile_i
        let projectile_direction
        let projectile_range
        function projectile(_position, _direction) {
            projectile_i = _position + _direction
            projectile_direction = _direction
        }
        
        //Game Update
        let game_clock = setInterval(game_update, 20)        
        function game_update() {
            //Generate Scene
            let scene_text = ""
            for (let scene_i = 1, _xLength = 0; scene_i <= map_iMax; scene_i++) {
                /*Player*/ if (scene_i == player_i) {scene_text += "@"} /*Border*/ else if (map_borders.includes(scene_i)) {continue} /*Monster*/ else if (map_monsters.includes(scene_i) && map_diggeds.includes(scene_i)) {game_text += "!"} /*Wall*/ else if (!map_diggeds.includes(scene_i)) {scene_text += "#"} /*Projectile*/ else if (scene_i == projectile_i) {scene_text += "%"} /*Pattern*/ else {let _pattern = 0; for (let y_i = -1; y_i < 2; y_i++) {for (let x_i = -1; x_i < 2; x_i++) {if (map_monsters.includes(scene_i - x_i - y_i * map_size)) {_pattern++}}}; (_pattern > 0) ? scene_text += _pattern : /*Empty*/ scene_text += "."}
                _xLength++
                if (_xLength == map_size - 2) {scene_text += "<br>"; _xLength = 0}
            }
            document.getElementById("Scene").innerHTML = scene_text

            //Move Player Bullet
            if (!map_borders.includes(projectile_i) || (map_diggeds.includes(projectile_i))) {projectile_i += projectile_direction}
        }
    </script>
</html>
