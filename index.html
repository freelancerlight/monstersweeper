<!DOCTYPE html>
<html>
    <head>
        <style>
            #Scene {
                font-family: "Courier New", Courier, monospace;
            }
        </style>
        <title>Monstersweeper</title>
    </head>
    <body>
        <p id="Scene">Loading... (or broken if the second have passed)</p>
        <p id="HUD"></p>
    </body>
    <script>
        //Variable Setup
        let dev = 0, Game = {}, game_state = 0, game_clock = 0, gameMenu_i = 0;
        
        //Functions 
        function Monster(A) {this.mapI = A, this.direction = 0,this.freed = false};
        function Projectile(A, B, C, D, E) {this.position = A; this.direction = B; this.range = C; this.destroyWall = D; this.damage = E; this.rangeI = 0};
        
        function game(_mapXSize, _mapYSize, _playerMapI, _mapDiggeds, _mapMonsters, _mapOres) {
            let array = []
            Game = {state:1, map_xSize:_mapXSize, map_ySize:_mapYSize, map_iL:_mapXSize * _mapYSize, ore_diggeds:[], projectiles:[]};

            //Generate Map Borders
            for (let i = 1; i <= Game.map_xSize; i++) {array.push(i); array.push(Game.map_iL - i + 1)};
            for (let i = 1; i <= Game.map_ySize - 2; i++) {array.push(1 + Game.map_xSize * i); array.push(Game.map_xSize * (1 + i))};
            Game.map_borders = array;

            //Generate Player
            if (_playerMapI == 0) {let v = 1; do {v = Math.ceil(Math.random() * Game.map_iL)} while (Game.map_borders.includes(v)); Game.player_mapI = v} else {Game.player_mapI = _playerMapI}

            //Generate Map Diggeds
            if (Array.isArray(_mapDiggeds)) {Game.map_diggeds = [_mapDiggeds]} else {array = []; for (let i_y = -_mapDiggeds; i_y <= _mapDiggeds; i_y++) {for (let i_x = -_mapDiggeds; i_x <= _mapDiggeds; i_x++) {array.push(Game.player_mapI - i_y * Game.map_xSize - i_x)}}};
            Game.map_diggeds = array

            //Generate Monster
            if (Array.isArray(_mapMonsters)) {Game.monsters = [_mapMonsters]} else {array = []; for (let i = 0; i < _mapMonsters;) {/*Generate Monster*/ let v = Math.ceil(Math.random() * Game.map_iL); /*Check*/ if (!Game.map_borders.includes(v) && !Game.map_diggeds.includes(v) && !array.includes(v)) {array.push(v); i++}}};
            Game.monsters = array

            //Generate Ores
            if (Array.isArray(_mapOres)) {Game.ores = [_mapOres]} else {array = []; for (let i = 0; i < _mapOres;) {/*Generate Ore*/ let v = Math.ceil(Math.random() * Game.map_iL); /*Check*/ if (!Game.map_borders.includes(v) && !Game.map_diggeds.includes(v) && !Game.monsters.includes(v) && !array.includes(v)) {array.push(v); i++}}};
            Game.ores = array
            
            console.log(Game);
            gameResume()
        };
        
        function gameResume() {if (Game.state) {game_state = 1; game_clock = setInterval(game_update, 20); document.getElementById("HUD").innerHTML = ""}};

        //Game Menu Setup
        let gameMenu_using = false
        function gameMenuObjectKey(gameMenuObject_id, gameMenuObject_name, gameMenuObject_key) {
            this.id = gameMenuObject_id;
            this.name = gameMenuObject_name;
            this.key = gameMenuObject_key;
            this.function = function() {rebind(this.id)}
        };
        const GameMenu = [
            {id:10, name:"New Game", function:function() {}},
                {id:110, name:"Chapter 1", function:function() {level(1)}},
            {id:20, name:"Settings", function:function() {}},
                {id:120, name:"Controls", function:function() {}},
                    //new gameMenuObjectKey(1120, "Move Left", "a"),
                    {id:1120, name:"Move Left", key:"a", function:function() {rebind(this.id)}},
                    {id:2120, name:"Move Right", key:"d", function:function() {rebind(this.id)}},
                    {id:3120, name:"Move Down", key:"s", function:function() {rebind(this.id)}},
                    {id:4120, name:"Move Up", key:"w", function:function() {rebind(this.id)}},
                    {id:5120, name:"Use Tool Left", key:"o", function:function() {rebind(this.id)}},
                    {id:6120, name:"Use Tool Right", key:"[", function:function() {rebind(this.id)}},
                    {id:7120, name:"Use Tool Down", key:"k", function:function() {rebind(this.id)}},
                    {id:8120, name:"Use Tool Up", key:"p", function:function() {rebind(this.id)}}
        ];
        function rebind(_gameMenuId) {
            const v_gameMenuBind = GameMenu.find(e => e.id === _gameMenuId).key
            function bind(event) {
                (GameMenu.find(e => e.id === _gameMenuId)).key = event.key;
                console.log("After: " + v_gameMenuBind);
                window.removeEventListener("keydown", bind);
                gameMenu_using = false
                gameMenuDecrease();
                drawGameMenu();
            };
            window.addEventListener("keydown", bind);
            gameMenu_using = true
            document.getElementById("HUD").innerHTML = "'Press any key to rebind selected key'"
            console.log("Before: " + v_gameMenuBind)
        };
        function gameMenuId (_gameMenuI) {
            const v_gameMenu = GameMenu.find(e => e.id === _gameMenuI);
            if (v_gameMenu) {v_gameMenu.function()};
        }
        function gameMenuDecrease() {gameMenu_i -= Math.pow(10, gameMenu_i.toString().length - 1) * gameMenu_i.toString().charAt(0); gameMenuId(gameMenu_i)}
        function gameMenu(_gameMenuI) {
            /*Reset*/ if (_gameMenuI == -1) { 
                gameMenu_i = 0;
            } /*Decrease*/ else if (_gameMenuI == 0) { 
                gameMenuDecrease()
            } /*Increase*/ else {
                const i_gameMenu = Math.pow(10, gameMenu_i.toString().length) * _gameMenuI;
                if (GameMenu.find(e => e.id === gameMenu_i + i_gameMenu)) {
                    gameMenu_i += i_gameMenu;
                    gameMenuId(gameMenu_i)
                    console.log(Object.keys({i_gameMenu})[0] + ": " + i_gameMenu);
                };
            };
            console.log(Object.keys({gameMenu_i})[0] + ": " + gameMenu_i + ", " + Object.keys({_gameMenuI})[0] + ": " + _gameMenuI);
            if (!gameMenu_using) {drawGameMenu()};
        };
        function drawGameMenu() {
            const log_drawGameMenu = []
            document.getElementById("HUD").innerHTML = ""
            for (let i_drawGameMenu = 1; i_drawGameMenu <= 9; i_drawGameMenu++) {
                const drawGameMenu_v = gameMenu_i + (Math.pow(10, gameMenu_i.toString().length) * i_drawGameMenu)
                const v_drawGameMenu = GameMenu.find(e => e.id === drawGameMenu_v);
                if (v_drawGameMenu) {document.getElementById("HUD").innerHTML += "[" + i_drawGameMenu + "] " + v_drawGameMenu.name};
                if (v_drawGameMenu?.key) {document.getElementById("HUD").innerHTML += " - " + v_drawGameMenu.key}
                if (v_drawGameMenu) {document.getElementById("HUD").innerHTML += "<br>";}
                log_drawGameMenu.push(drawGameMenu_v);
            };
            console.log("i_drawGameMenu: " + log_drawGameMenu)

            if (gameMenu_i > 0 && !game_state) {document.getElementById("HUD").innerHTML += "<br>[0] Back"};
            console.log(Object.keys({gameMenuBack_v})[0] + ": " + gameMenuBack_v);
        };

        function level(_i) {
            if (_i == 1) {game(15, 15, 0, 1, 10, 10)};
        };

        level(1)

        //Player Action
        let player_tool = 1;
        function player_key(_playerKey) {return GameMenu.find(e => e.id === _playerKey).key}
        function player_actionKey(_playerActionKey) {return Number(event.key == player_key(_playerActionKey))}
        function player_movement(_direction) {if (!Game.map_borders.includes(Game.player_mapI + _direction) && Game.map_diggeds.includes(Game.player_mapI + _direction)) {Game.player_mapI += _direction}}
        window.addEventListener("keydown", function (event) {
            /*Toggle Dev*/ if (event.key == "=") {
                if (dev) {dev = 0} else {dev = 1};
                console.log(Object.keys({dev})[0] + ": " + dev)
            };
            /*Pause Game*/ if (event.key == "`") {if (!game_state && Game.state) {gameResume()} else {game_state = 0}};
            if (game_state) {
                /*Movement*/ player_movement((player_actionKey(2120) - player_actionKey(1120)) + (Game.map_xSize * (player_actionKey(3120) - player_actionKey(4120))));
                console.log("player_mapI: " + Game.player_mapI)
                
                /*Fire*/ const fireKeys = [player_key(5120), player_key(6120), player_key(7120), player_key(8120)];
                if (fireKeys.includes(event.key)) {Game.projectiles.push(new Projectile(/*_position*/ Game.player_mapI, /*_direction*/ (player_actionKey(6120) - player_actionKey(5120)) + (Game.map_xSize * (player_actionKey(7120) - player_actionKey(8120))), /*_range*/ 1, /*_destroyWall*/ true, /*_damage*/ false))};
                
                /*Change Tool if (Number(event.key)) {player_tool = Number(event.key); console.log(player_tool)*/
            } else {if (Number(event.key) || event.key == 0) {gameMenu(Number(event.key))}}; console.log("Player Key: " + event.key)});

        //Game Update        
        function game_update() {
            if (game_state) {
                //Generate Scene
                let scene_text = "";
                for (let scene_i = 1, i_x = 0; scene_i <= Game.map_iL; scene_i++) {/*Player*/ if (scene_i == Game.player_mapI) {scene_text += "@"} /*Border*/ else if (Game.map_borders.includes(scene_i)) {if (dev) {scene_text += "X"} else {continue}} /*Projectile*/ else if (Game.projectiles.some(Projectile => Projectile.position === scene_i)) {scene_text += "%"} /*Ore*/ else if (Game.ores.includes(scene_i)) {scene_text += "$"} /*Ore Digged*/ else if (Game.ore_diggeds.includes(scene_i)) {scene_text += "*"} /*Wall*/ else if (!Game.map_diggeds.includes(scene_i)) {scene_text += "#"} /*Monster*/ else if (Game.monsters.includes(scene_i)) {scene_text += "!"} /*Pattern*/ else {let _pattern = 0; for (let y_i = -1; y_i < 2; y_i++) {for (let x_i = -1; x_i < 2; x_i++) {if (Game.monsters.includes(scene_i - x_i - y_i * Game.map_xSize)) {_pattern++}}}; (_pattern > 0) ? scene_text += _pattern : /*Empty*/ scene_text += "."}; /*Next Loop*/ i_x++; /*Add Line Break*/ if ((i_x == Game.map_xSize && dev) || (i_x == Game.map_xSize - 2 && !dev)) {scene_text += "<br>"; i_x = 0}};
                document.getElementById("Scene").innerHTML = scene_text;
    
                //Monster Code
                //monsters.forEach(monster => {if (!monster.freed) {monster.freed = true}; /*Detection*/ if (!map_diggeds.includes(monster.mapI)) {for (let direction_i = 0; direction_i < 4; direction_i++) {for (let i = monster.mapI; !map_diggeds.includes(i) && !map_borders.includes(i); i += directions[direction_i]) {console.log(monster.mapI); /*console.log(map_diggeds.includes(i))*/}}} /*&& !map_borders.includes(monster.mapI + 1) && map_diggeds.includes(monster.mapI + monster.direction)) {monster.mapI += monster.direction}*/});
    
                //Projectile Code
                Game.projectiles.forEach(Projectile => {/*Move Projectile*/ if (!Game.map_borders.includes(Projectile.position) && Game.map_diggeds.includes(Projectile.position) && Projectile.range && Projectile.rangeI < Projectile.range) {Projectile.position += Projectile.direction; Projectile.rangeI += 1} else {/*Dig Soft Block*/ if (!Game.map_diggeds.includes(Projectile.position) && Projectile.destroyWall) {Game.map_diggeds.push(Projectile.position)}; /*Dig Ore*/ if (Game.ores.includes(Projectile.position) && Projectile.destroyWall) {Game.ore_diggeds.push(Projectile.position); Game.ores.splice(Game.ores.indexOf(Projectile.position), 1)} /*Delete Projectile*/ Game.projectiles.splice(Game.projectiles.indexOf(this), 1)}});
            } else {clearInterval(game_clock); gameMenu(-1); return};   
        };
    </script>
</html>
