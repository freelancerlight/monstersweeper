<!DOCTYPE html>
<html>
    <head>
        <style>
            #Scene {
                font-family: "Courier New", Courier, monospace;
            }
        </style>
        <title>Monstersweeper</title>
    </head>
    <body id="Main">
        <p id="Scene">Monstersweeper</p>
        <p id="System">🄯2026 Jie (杰) 3JUMPAB</p>
        <p id="HUD">Press "`" to open the game menu.</p>
    </body>
    <script>
        //Variable Setup
        let dev = 0, Game = {}, game_state = 1, game_clock = 0, menu_i = 0;

        //function defaultSettings() {settings_playerControls.push(...default_playerControls)};
        function changeSetting(changeSetting_name, changeSetting_v) {localStorage.setItem(changeSetting_name, changeSetting_v)};
        
        const default_playerControls = ["a", "d", "s", "w", "o", "[", "k", "p"]
        const settings_playerControls = []
        if (localStorage.playerControls !== null && localStorage.playerControls !== undefined) {settings_playerControls.push(...JSON.parse(localStorage.playerControls))} else {settings_playerControls.push(...default_playerControls)};
        const settings_gameBackgroundColors = ["#000000", "#606060", null, "#404040", null, "#ffffff"];
        const settings_gameColors = [null, "#000000", "#808080", "#ffffff"];

        /*changeColor(true, "Main", 0);
        changeColor(false, "Scene", 1);
        changeColor(false, "HUD", 3);*/
        changeColor(true, "System", 0);
        changeColor(false, "System", 3);
        
        function playerKeyCheck(playerKeyCheck_key) {if (event.key == playerKeyCheck_key) {return true} else {return false}};
        function changeColor(changeColor_background, changeColor_v, changeColor_i) {if (changeColor_background) {document.getElementById(changeColor_v).style.backgroundColor = settings_gameBackgroundColors[changeColor_i]} else {document.getElementById(changeColor_v).style.color = settings_gameColors[changeColor_i]}};

        function changeText(changeText_type, changeText_name, changeText_v) {if (changeText_type) {document.getElementById(changeText_name).innerHTML += changeText_v} else {document.getElementById(changeText_name).innerHTML = changeText_v}};
        
        //Functions 
        function Monster(A) {this.mapI = A, this.direction = 0,this.freed = false};
        function Projectile(A, B, C, D, E) {this.position = A; this.direction = B; this.range = C; this.destroyWall = D; this.damage = E; this.rangeI = 0};
        
        function game(_mapXSize, _mapYSize, _playerMapI, _mapDiggeds, _mapMonsters, _mapOres) {
            let array = []
            Game = {state:1, map_xSize:_mapXSize, map_ySize:_mapYSize, map_iL:_mapXSize * _mapYSize, ore_diggeds:[], projectiles:[]};

            //Generate Map Borders
            for (let i = 1; i <= Game.map_xSize; i++) {array.push(i); array.push(Game.map_iL - i + 1)};
            for (let i = 1; i <= Game.map_ySize - 2; i++) {array.push(1 + Game.map_xSize * i); array.push(Game.map_xSize * (1 + i))};
            Game.map_borders = array;

            //Generate Player
            if (_playerMapI == 0) {let v = 1; do {v = Math.ceil(Math.random() * Game.map_iL)} while (Game.map_borders.includes(v)); Game.player_mapI = v} else {Game.player_mapI = _playerMapI}

            //Generate Map Diggeds
            if (Array.isArray(_mapDiggeds)) {Game.map_diggeds = [_mapDiggeds]} else {array = []; for (let i_y = -_mapDiggeds; i_y <= _mapDiggeds; i_y++) {for (let i_x = -_mapDiggeds; i_x <= _mapDiggeds; i_x++) {array.push(Game.player_mapI - i_y * Game.map_xSize - i_x)}}};
            Game.map_diggeds = array

            //Generate Monster
            if (Array.isArray(_mapMonsters)) {Game.monsters = [_mapMonsters]} else {array = []; for (let i = 0; i < _mapMonsters;) {/*Generate Monster*/ let v = Math.ceil(Math.random() * Game.map_iL); /*Check*/ if (!Game.map_borders.includes(v) && !Game.map_diggeds.includes(v) && !array.includes(v)) {array.push(v); i++}}};
            Game.monsters = array

            //Generate Ores
            if (Array.isArray(_mapOres)) {Game.ores = [_mapOres]} else {array = []; for (let i = 0; i < _mapOres;) {/*Generate Ore*/ let v = Math.ceil(Math.random() * Game.map_iL); /*Check*/ if (!Game.map_borders.includes(v) && !Game.map_diggeds.includes(v) && !Game.monsters.includes(v) && !array.includes(v)) {array.push(v); i++}}};
            Game.ores = array
            
            console.log(Game);
            gameResume()
        };

        //Game Menu Setup
        let gameMenu_using = false
        function gameMenuEmptyObject(gameMenuEmptyObject_id, gameMenuEmptyObject_name) {
            this.id = gameMenuEmptyObject_id;
            this.name = gameMenuEmptyObject_name;
            this.function = function() {}
        }
        function gameMenuRebindObject(gameMenuRebindObject_id, gameMenuRebindObject_name, gameMenuRebindObject_key) {
            this.id = gameMenuRebindObject_id;
            this.name = gameMenuRebindObject_name;
            this.nameExtra = function() {return settings_playerControls[gameMenuRebindObject_key]}
            this.function = function() {rebind(gameMenuRebindObject_key)}
        }
        function rebind(rebind_id) {
            function bind(event) {
                settings_playerControls[rebind_id] = event.key;
                changeText(0, "System", "Control Rebinded: " + event.key);
                changeSetting("playerControls", JSON.stringify(settings_playerControls))
                window.removeEventListener("keydown", bind);
                gameMenu_using = false
                changeGameMenu(-gameMenuDecrease())
            };
            window.addEventListener("keydown", bind);
            gameMenu_using = true;
            changeText(0, "HUD", "");
            changeText(0, "System", "'Press any key to rebind selected key'");
        };
        const GameMenu = [
            new gameMenuEmptyObject(10, "New Game"),
                {id:110, name:"Chapter 1", function:function() {level(1)}},
            new gameMenuEmptyObject(20, "Settings"),
                new gameMenuEmptyObject(120, "Controls"),
                    new gameMenuRebindObject(1120, "Move Left", 0),
                    new gameMenuRebindObject(2120, "Move Right", 1),
                    new gameMenuRebindObject(3120, "Move Down", 2),
                    new gameMenuRebindObject(4120, "Move Up", 3),
                    new gameMenuRebindObject(5120, "Use Tool Left", 4),
                    new gameMenuRebindObject(6120, "Use Tool Right", 5),
                    new gameMenuRebindObject(7120, "Use Tool Down", 6),
                    new gameMenuRebindObject(8120, "Use Tool Up", 7),
                {id:920, name:"Delete Settings Data", function:function() {localStorage.clear(); settings_playerControls.splice(0, settings_playerControls.length); settings_playerControls.push(...default_playerControls)}}
        ];
        function gameMenuIncrease(gameMenuIncrease_v) {return Math.pow(10, menu_i.toString().length) * gameMenuIncrease_v};
        function gameMenuDecrease() {return Math.pow(10, menu_i.toString().length - 1) * menu_i.toString().charAt(0)};
        function gameMenuCheck(gameMenuCheck_v) {return GameMenu.find(e => e.id === gameMenuCheck_v)};
        function changeGameMenu(changeGameMenu_v) {
            menu_i += changeGameMenu_v;
            if (gameMenuCheck(menu_i)) {gameMenuCheck(menu_i).function()};
            drawGameMenu();
        }
        function gameMenu(gameMenu_v) {if (gameMenu_v == -1) {changeGameMenu(-gameMenuDecrease())} else if (gameMenu_v == 0) {changeText(0, "HUD", "")} else if (gameMenuCheck(menu_i + gameMenuIncrease(gameMenu_v))) {changeGameMenu(gameMenuIncrease(gameMenu_v))} else {drawGameMenu()}};
        function drawGameMenu() {
            if (!gameMenu_using) {
                changeText(0, "HUD", "")
                for (let i_drawGameMenu = 1; i_drawGameMenu <= 9; i_drawGameMenu++) {
                    const v_drawGameMenu = gameMenuCheck(menu_i + gameMenuIncrease(i_drawGameMenu));
                    if (v_drawGameMenu) {changeText(1, "HUD", "[" + i_drawGameMenu + "] " + v_drawGameMenu.name)};
                    if (v_drawGameMenu?.nameExtra) {changeText(1, "HUD", " - " + v_drawGameMenu.nameExtra())};
                    changeText(1, "HUD", "<br>");
                };
                if (menu_i > 0 && !game_state) {changeText(1, "HUD", "<br>[0] Back")};   
            }
        };
        
        function level(_i) {
            if (_i == 1) {game(15, 15, 0, 1, 10, 10)};
        };

        //Player Action
        let player_tool = 1;
        window.addEventListener("keydown", function (event) {
            if (playerKeyCheck("=")) {if (dev) {dev = 0} else {dev = 1}};
            if (playerKeyCheck("`")) {
                if (game_state) {gamePause()} else {gameResume()};
                changeText(0, "System", "");
            };
            
            if (game_state && Game.state) {
                function playerKey(playerKey_v) {return Number(settings_playerControls[playerKey_v].includes(event.key))};
                //function player_actionKey(_playerActionKey) {return Number(event.key == player_key(_playerActionKey))}
                function playerGeneralAction(playerGeneralAction_left, playerGeneralAction_right, playerGeneralAction_down, playerGeneralAction_up) {return (playerKey(playerGeneralAction_right) - playerKey(playerGeneralAction_left)) + (Game.map_xSize * (playerKey(playerGeneralAction_down) - playerKey(playerGeneralAction_up)))}
                function playerMovement(_direction) {if (!Game.map_borders.includes(Game.player_mapI + _direction) && Game.map_diggeds.includes(Game.player_mapI + _direction)) {Game.player_mapI += _direction}};
                
                playerMovement(playerGeneralAction(0, 1, 2, 3));
                
                const v_event = playerGeneralAction(4, 5, 6, 7);
                if (v_event != 0) {Game.projectiles.push(new Projectile(/*_position*/ Game.player_mapI, /*_direction*/ v_event, /*_range*/ 1, /*_destroyWall*/ true, /*_damage*/ false))};
                
                /*Change Tool if (Number(event.key)) {player_tool = Number(event.key); console.log(player_tool)*/
            } else if (game_state == 0) {if (event.key == 0) {gameMenu(-1)} else if (Number(event.key)) {gameMenu(Number(event.key))}}});

        //Game
        function gameResume() {if (Game.state == 1) {game_clock = setInterval(game_update, 20)}; changeColor(false, "Scene", 1); game_state = 1; changeText(0, "HUD", "")};
        function gamePause() {if (typeof game_clock !== "undefined") {clearInterval(game_clock)}; changeColor(false, "Scene", 2); game_state = 0; menu_i = 0; gameMenu()};
        function game_update() {
            if (game_state) {
                //Generate Scene
                let scene_text = "";
                for (let scene_i = 1, i_x = 0; scene_i <= Game.map_iL; scene_i++) {/*Player*/ if (scene_i == Game.player_mapI) {scene_text += "@"} /*Border*/ else if (Game.map_borders.includes(scene_i)) {if (dev) {scene_text += "X"} else {continue}} /*Projectile*/ else if (Game.projectiles.some(Projectile => Projectile.position === scene_i)) {scene_text += "%"} /*Ore*/ else if (Game.ores.includes(scene_i)) {scene_text += "$"} /*Ore Digged*/ else if (Game.ore_diggeds.includes(scene_i)) {scene_text += "*"} /*Wall*/ else if (!Game.map_diggeds.includes(scene_i)) {scene_text += "#"} /*Monster*/ else if (Game.monsters.includes(scene_i)) {scene_text += "!"} /*Pattern*/ else {let _pattern = 0; for (let y_i = -1; y_i < 2; y_i++) {for (let x_i = -1; x_i < 2; x_i++) {if (Game.monsters.includes(scene_i - x_i - y_i * Game.map_xSize)) {_pattern++}}}; (_pattern > 0) ? scene_text += _pattern : /*Empty*/ scene_text += "."}; /*Next Loop*/ i_x++; /*Add Line Break*/ if ((i_x == Game.map_xSize && dev) || (i_x == Game.map_xSize - 2 && !dev)) {scene_text += "<br>"; i_x = 0}};
                changeText(0, "Scene", scene_text);
    
                //Monster Code
                //monsters.forEach(monster => {if (!monster.freed) {monster.freed = true}; /*Detection*/ if (!map_diggeds.includes(monster.mapI)) {for (let direction_i = 0; direction_i < 4; direction_i++) {for (let i = monster.mapI; !map_diggeds.includes(i) && !map_borders.includes(i); i += directions[direction_i]) {console.log(monster.mapI); /*console.log(map_diggeds.includes(i))*/}}} /*&& !map_borders.includes(monster.mapI + 1) && map_diggeds.includes(monster.mapI + monster.direction)) {monster.mapI += monster.direction}*/});
    
                //Projectile Code
                Game.projectiles.forEach(Projectile => {/*Move Projectile*/ if (!Game.map_borders.includes(Projectile.position) && Game.map_diggeds.includes(Projectile.position) && Projectile.range && Projectile.rangeI < Projectile.range) {Projectile.position += Projectile.direction; Projectile.rangeI += 1} else {/*Dig Soft Block*/ if (!Game.map_diggeds.includes(Projectile.position) && Projectile.destroyWall) {Game.map_diggeds.push(Projectile.position)}; /*Dig Ore*/ if (Game.ores.includes(Projectile.position) && Projectile.destroyWall) {Game.ore_diggeds.push(Projectile.position); Game.ores.splice(Game.ores.indexOf(Projectile.position), 1)} /*Delete Projectile*/ Game.projectiles.splice(Game.projectiles.indexOf(this), 1)}});
            };   
        };
    </script>
</html>
