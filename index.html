<!DOCTYPE html>
<html>
    <head>
        <style>
            #Scene {
                font-family: "Courier New", Courier, monospace;
            }
        </style>
        <title>Monstersweeper</title>
    </head>
    <body>
        <p id="Scene">Loading... (or broken if the second have passed)</p>
        <button onclick="clearInterval(game_clock)">Stop Game</button>
    </body>
    <script>
        const map_size = 15
        const map_iMax = Math.pow(map_size, 2);
        let player_i = Math.ceil(map_iMax / 2);

        //Generate Map Border
        const map_borders = []
        for (let i = 1; i <= map_size; i++) {map_borders.push(i); map_borders.push(map_iMax - i + 1)}
        for (let i = 1; i <= map_size - 2; i++) {map_borders.push(1 + map_size * i); map_borders.push(map_size * (1 + i))};
        console.log("Map Borders: " + map_borders)
        
        //Generate Map Digged
        const map_diggeds = []
        for (let i_y = -1; i_y < 2; i_y++) {for (let i_x = -1; i_x < 2; i_x++) {map_diggeds.push(player_i - i_y * map_size - i_x)}}
        console.log("Map Diggeds: " + map_diggeds)

        //Monster Setup
        const _monsters = []
        function monster(A) {this._mapI = A}
        for (let i = 0; i < 10;) {/*Generate Monster*/ let monster_i = Math.ceil(Math.random() * map_iMax); /*Check Before Add*/ if (!map_borders.includes(monster_i) && !map_diggeds.includes(monster_i) && (monster => monster._mapI !== monster_i)) {_monsters.push(new monster(monster_i)); /*Next Monster*/ i++}};
        console.log(_monsters);

        //Projectile
        const _projectiles = []
        function projectile(A, B, C, D, E) {this._position = A; this._direction = B; this._range = C; this._destroyWall = D; this._damage = E; this._rangeI = 0}

        //Player Action
        let player_tool = 1
        function player_movement(_direction) {if (!map_borders.includes(player_i + _direction) && map_diggeds.includes(player_i + _direction)) {player_i += _direction}}
        window.addEventListener("keydown", function (event) {/*Movement*/ player_movement((Number(event.key == "d") - Number(event.key == "a")) + (map_size * (Number(event.key == "s") - Number(event.key == "w")))); /*Fire*/ const fireKeys = ["o", "[", "k", "p"]; if (fireKeys.includes(event.key)) {_projectiles.push(new projectile(/*_position*/ player_i, /*_direction*/ ((Number(event.key == "[") - Number(event.key == "o"))) + (map_size * (Number(event.key == "k") - Number(event.key == "p"))), /*_range*/ 1, /*_destroyWall*/ true, /*_damage*/ false))}

            //Change Tool
            if (Number(event.key)) {player_tool = Number(event.key)}});

        //Game Update
        let game_clock = setInterval(game_update, 20)        
        function game_update() {
            //Generate Scene
            let scene_text = ""
            for (let scene_i = 1, _xLength = 0; scene_i <= map_iMax; scene_i++) {
                /*Player*/ if (scene_i == player_i) {scene_text += "@"} /*Border*/ else if (map_borders.includes(scene_i)) {continue} /*Wall*/ else if (!map_diggeds.includes(scene_i)) {scene_text += "#"} /*Monster*/ else if (_monsters.some(monster => monster._mapI === scene_i)) {scene_text += "!"} /*Projectile*/ else if (_projectiles.some(projectile => projectile._position === scene_i)) {scene_text += "%"} /*Pattern*/ else {let _pattern = 0; for (let y_i = -1; y_i < 2; y_i++) {for (let x_i = -1; x_i < 2; x_i++) {if (_monsters.some(monster => monster._mapI === scene_i - x_i - y_i * map_size)) {_pattern++}}}; (_pattern > 0) ? scene_text += _pattern : /*Empty*/ scene_text += "."}; /*Next Loop*/ _xLength++; /*Add Line Break*/ if (_xLength == map_size - 2) {scene_text += "<br>"; _xLength = 0}}
            document.getElementById("Scene").innerHTML = scene_text

            //Monster Code
            function monster_detectionX(_direction, _variable) {for (let i_x = monster._mapI; !map_border.includes(i_x) && map_digged.includes(i_x); i_x += _direction) {if (i_x == _variable) {enemy_index += _direction; enemy_moved = true}}}
            _monsters.forEach(monster => {};)
            
            /*function monster_xCheck(_direction) {function monster_yCheck() {for (let i_y = i_x; _monsters.some(monster => monster._mapI) && map_digged.includes(i); i += _direction) {if (i == player_index) {enemy_index += _direction; enemy_moved = true}};}for (let i = enemy_index; !map_border.includes(i) && map_digged.includes(i) && !enemy_moved; i += _direction) {if (i == player_index) {enemy_index += _direction; enemy_moved = true}; enemy_yCheck(i, map_size * 1); enemy_yCheck(i, map_size * -1)}}*/

            //Projectile Code
            _projectiles.forEach(projectile => {/*Move Projectile*/ if (!map_borders.includes(projectile._position) && map_diggeds.includes(projectile._position) && projectile._range && projectile._rangeI < projectile._range) {projectile._position += projectile._direction; projectile._rangeI += 1} else {/*Destroy Wall*/ if (!map_diggeds.includes(projectile._position) && projectile._destroyWall) {map_diggeds.push(projectile._position)}; /*Delete Projectile*/ _projectiles.splice(_projectiles.indexOf(this), 1)}});
        }
    </script>
</html>
